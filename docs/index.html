<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日経ニュースダイジェスト - 2026年04月10日</title>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --text: #333;
            --text-light: #666;
            --bg: #f5f5f5;
            --card-bg: #fff;
            --border: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            padding: 24px 0;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        header .subtitle {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 6px;
        }

        .update-info {
            text-align: center;
            padding: 12px;
            font-size: 0.8rem;
            color: var(--text-light);
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        .category {
            margin-bottom: 24px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 0;
            border-bottom: 3px solid var(--accent);
            margin-bottom: 12px;
        }

        .category-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: #fff;
            flex-shrink: 0;
        }

        .icon-economy { background: #2196F3; }
        .icon-market { background: #4CAF50; }
        .icon-politics { background: #FF9800; }

        .category-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .article-list {
            list-style: none;
        }

        .article-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 8px;
            transition: box-shadow 0.2s, transform 0.1s;
        }

        .article-item:hover {
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transform: translateY(-1px);
        }

        .article-item a {
            text-decoration: none;
            color: var(--text);
            display: block;
        }

        .article-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 4px;
        }

        .article-item:hover .article-title {
            color: var(--accent);
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .article-time {
            white-space: nowrap;
        }

        .article-summary {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 6px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .empty-message {
            text-align: center;
            padding: 24px;
            color: var(--text-light);
            font-size: 0.9rem;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        footer {
            text-align: center;
            padding: 24px;
            font-size: 0.75rem;
            color: var(--text-light);
            border-top: 1px solid var(--border);
            margin-top: 32px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 12px;
            }

            header h1 {
                font-size: 1.3rem;
            }

            .article-item {
                padding: 12px;
            }

            .article-title {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>日経ニュースダイジェスト</h1>
        <div class="subtitle">投資 / 経済 / 政治 - 厳選ニュース</div>
    </header>

    <div class="update-info">
        最終更新: 2026年04月10日 14:55 (JST)
    </div>

    <div class="container">
        
        <section class="category">
            <div class="category-header">
                
                <div class="category-icon icon-economy">&#9733;</div>
                
                <h2>経済</h2>
            </div>

            
            <div class="empty-message">
                現在このカテゴリのニュースはありません
            </div>
            
        </section>
        
        <section class="category">
            <div class="category-header">
                
                <div class="category-icon icon-market">$</div>
                
                <h2>マーケット・投資</h2>
            </div>

            
            <div class="empty-message">
                現在このカテゴリのニュースはありません
            </div>
            
        </section>
        
        <section class="category">
            <div class="category-header">
                
                <div class="category-icon icon-politics">&#9878;</div>
                
                <h2>政治</h2>
            </div>

            
            <div class="empty-message">
                現在このカテゴリのニュースはありません
            </div>
            
        </section>
        
    </div>

    <footer>
        <p>ニュースは日経新聞等のRSSフィードから自動取得されています</p>
        <p>毎朝 8:00 (JST) に自動更新</p>
    </footer>
</body>
</html>
